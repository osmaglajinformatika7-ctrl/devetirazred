<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Grade Calculator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        .container {\n            display: flex;\n            justify-content: space-between;\n        }\n        .grade-calculator, .about {\n            width: 48%;\n        }\n        img {\n            max-width: 100%;\n            height: auto;\n        }\n    </style>\n</head>\n<body>\n    <h1>Grade Calculator</h1>\n    <div class="grade-calculator">\n        <label for="grade">Enter your grade:</label>\n        <input type="number" id="grade" name="grade">\n        <button onclick="calculateGrade()">Calculate</button>\n        <p id="result"></p>\n        <script>\n            function calculateGrade() {\n                const grade = document.getElementById('grade').value;\n                let result;\n                if (grade >= 90) {\n                    result = 'You got an A!';\n                } else if (grade >= 80) {\n                    result = 'You got a B!';\n                } else if (grade >= 70) {\n                    result = 'You got a C!';\n                } else if (grade >= 60) {\n                    result = 'You got a D!';\n                } else {\n                    result = 'You got an F!';\n                }\n                document.getElementById('result').innerText = result;\n            }\n        <\/script>\n    </div>\n    <div class="about">\n        <h2>O meni</h2>\n        <p>This is a section about the application.</p>\n        <img src="your-image-url-here" alt="About Image">\n    </div>\n</div>\n</body>\n</html>
